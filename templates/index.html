<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парсер документов РЖД</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #333;
        }

        .status {
            color: #667eea;
            font-weight: 600;
        }

        .current-action {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .download-link:hover {
            background: #218838;
        }

        .example {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .example pre {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            overflow-x: auto;
        }

        .task-id {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚂 Парсер документов РЖД</h1>
            <p>Автоматический сбор данных по вагонам из памяток</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="urls">Введите URL или ID документов (по одному на строку):</label>
                <textarea id="urls" rows="5" placeholder="https://cargolk.rzd.ru/documents/archive/memos/1723700552&#10;1725395220&#10;https://cargolk.rzd.ru/documents/archive/memos/1725520828"></textarea>
            </div>

            <button id="startBtn" onclick="startParsing()">Начать сбор данных</button>

            <div class="example">
                <strong>📌 Пример формата:</strong>
                <pre>https://cargolk.rzd.ru/documents/archive/memos/1723700552
1725395220
1725520828</pre>
                <p>Можно использовать как полные ссылки, так и только ID документов</p>
            </div>

            <div id="progressContainer" class="progress-container">
                <div class="progress-info">
                    <span id="progressText">Прогресс: 0/0</span>
                    <span id="status" class="status">idle</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div id="currentAction" class="current-action"></div>
                <div id="taskId" class="task-id"></div>
            </div>

            <div id="resultContainer" class="result">
                <div id="resultMessage"></div>
                <div id="downloadLink"></div>
            </div>
        </div>
    </div>

    <script>
        let statusInterval;
        let currentTaskId = null;

        function startParsing() {
            const urls = document.getElementById('urls').value;

            if (!urls.trim()) {
                alert('Введите хотя бы один URL');
                return;
            }

            // Показываем прогресс
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('startBtn').disabled = true;

            // Очищаем предыдущий интервал
            if (statusInterval) {
                clearInterval(statusInterval);
            }

            // Отправляем запрос на сервер
            fetch('/async_start_parsing', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'urls=' + encodeURIComponent(urls)
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(`HTTP error ${response.status}: ${text.substring(0, 100)}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    showResult('error', 'Ошибка: ' + data.error);
                    document.getElementById('startBtn').disabled = false;
                } else {
                    currentTaskId = data.task_id;
                    document.getElementById('taskId').textContent = `ID задачи: ${currentTaskId}`;
                    startStatusTracking(currentTaskId);
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                showResult('error', 'Ошибка соединения: ' + error.message);
                document.getElementById('startBtn').disabled = false;
            });
        }

        function startStatusTracking(taskId) {
            statusInterval = setInterval(() => {
                fetch(`/task_status/${taskId}`)
                    .then(response => response.json())
                    .then(data => {
                        updateProgress(data);

                        if (data.status === 'completed') {
                            clearInterval(statusInterval);
                            document.getElementById('startBtn').disabled = false;
                            document.getElementById('taskId').textContent = '';
                            showResult('success', data.message, data.file);
                        }
                        else if (data.status === 'error') {
                            clearInterval(statusInterval);
                            document.getElementById('startBtn').disabled = false;
                            document.getElementById('taskId').textContent = '';
                            showResult('error', data.message);
                        }
                        else if (data.status === 'not_found') {
                            clearInterval(statusInterval);
                            document.getElementById('startBtn').disabled = false;
                            document.getElementById('taskId').textContent = '';
                            showResult('error', 'Задача не найдена');
                        }
                    })
                    .catch(error => {
                        console.error('Ошибка при получении статуса:', error);
                        document.getElementById('currentAction').textContent =
                            'Ошибка соединения, повторная попытка...';
                    });
            }, 2000);
        }

        function updateProgress(data) {
            if (data.status === 'processing') {
                document.getElementById('status').textContent = 'processing';
                document.getElementById('currentAction').textContent = data.message || 'Обработка...';

                // Пытаемся извлечь прогресс из сообщения
                const match = data.message?.match(/(\d+)\s+из\s+(\d+)/);
                if (match) {
                    const current = parseInt(match[1]);
                    const total = parseInt(match[2]);
                    const percent = (current / total * 100);
                    document.getElementById('progressFill').style.width = percent + '%';
                    document.getElementById('progressText').textContent =
                        `Прогресс: ${current}/${total}`;
                }
            }
        }

        function showResult(type, message, filename) {
            const container = document.getElementById('resultContainer');
            const messageDiv = document.getElementById('resultMessage');
            const downloadDiv = document.getElementById('downloadLink');

            container.style.display = 'block';
            container.className = 'result ' + type;
            messageDiv.textContent = message;

            if (filename) {
                downloadDiv.innerHTML = `<a href="/download/${filename}" class="download-link">📥 Скачать результаты (ZIP)</a>`;
            } else {
                downloadDiv.innerHTML = '';
            }

            // Скрываем прогресс
            document.getElementById('progressContainer').style.display = 'none';
        }
    </script>
</body>
</html>
